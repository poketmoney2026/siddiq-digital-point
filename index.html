<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Account Cards</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
    body{
      min-height:100vh;color:#fff;padding:26px;
      background:
      radial-gradient(circle at top left,rgba(124,58,237,.24),transparent 34%),
      radial-gradient(circle at bottom right,rgba(14,165,233,.16),transparent 35%),
      linear-gradient(135deg,#090912 0%,#151326 48%,#07070d 100%);
    }
    .container{max-width:1180px;margin:auto}

    .filter{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
    .filter button{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.07);
      color:#d7d7e6;
      padding:11px 20px;
      border-radius:999px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      transition:.3s;
      backdrop-filter:blur(14px);
    }
    .filter button:hover{background:rgba(255,255,255,.12);color:#fff}
    .filter button.active{
      background:#fff;
      color:#050505;
      border-color:#fff;
      box-shadow:0 10px 28px rgba(255,255,255,.16);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:22px;
    }

    .card{
      position:relative;
      padding:12px;
      border-radius:24px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      backdrop-filter:blur(18px);
      overflow:hidden;
      cursor:pointer;
      outline:none;
      transition:.35s;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      padding:2px;
      border-radius:inherit;
      background:linear-gradient(90deg,#ff004c,#ffb703,#00f5d4,#38bdf8,#7c3aed,#ec4899,#ff004c);
      background-size:450% 100%;
      opacity:0;
      transition:.35s;
      pointer-events:none;
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
    }

    .card:hover,.card:focus,.card.is-active{
      transform:translateY(-6px);
      background:rgba(255,255,255,.095);
    }
    .card:hover::before,.card:focus::before,.card.is-active::before{
      opacity:1;
      animation:borderMove 16s linear infinite;
    }
    @keyframes borderMove{
      0%{background-position:200% 0}
      100%{background-position:-200% 0}
    }

    .img-box,.content{position:relative;z-index:1}
    .img-box{
      width:100%;
      aspect-ratio:1/1;
      overflow:hidden;
      border-radius:16px;
      background:rgba(255,255,255,.08);
    }
    .img-box img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition:.5s;
    }
    .card:hover img,.card.is-active img{transform:scale(1.06)}

    .content{padding:13px 3px 2px}
    .title{
      font-size:15px;
      font-weight:800;
      margin-bottom:10px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .info{
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin-bottom:14px;
    }
    .info span{
      font-size:11px;
      font-weight:700;
      padding:6px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      white-space:nowrap;
    }

    .bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,.09);
    }

    .price,.buy{
      width:96px;
      height:44px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
    }

    .price{
      background:linear-gradient(135deg,#16a34a,#22c55e);
      border:1px solid rgba(134,239,172,.7);
      box-shadow:0 8px 24px rgba(34,197,94,.22);
      color:#fff;
      font-size:16px;
    }

    .buy{
      border:1px solid rgba(255,255,255,.9);
      background:#fff;
      color:#050505;
      font-size:14px;
      cursor:pointer;
      transition:.3s;
      box-shadow:0 8px 24px rgba(255,255,255,.12);
    }
    .buy:hover{background:#050505;color:#fff;transform:scale(1.05)}
    .buy:active{transform:scale(.96)}

    .empty{
      grid-column:1/-1;
      padding:30px;
      text-align:center;
      border-radius:22px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:#d4d4d8;
    }

    @media(max-width:1024px){
      .grid{grid-template-columns:repeat(3,1fr)}
    }
    @media(max-width:768px){
      body{padding:18px}
      .filter{gap:9px;margin-bottom:22px}
      .filter button{padding:9px 14px;font-size:13px}
      .grid{grid-template-columns:repeat(2,1fr);gap:15px}
      .card{padding:9px;border-radius:20px}
      .img-box{border-radius:14px}
      .title{font-size:13px}
      .info span{font-size:9px;padding:5px 6px}
      .price,.buy{width:78px;height:40px}
      .price{font-size:14px}
      .buy{font-size:13px}
    }
    @media(max-width:420px){
      body{padding:14px}
      .filter{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
      .filter::-webkit-scrollbar{display:none}
      .filter button{white-space:nowrap}
      .grid{gap:12px}
      .bottom{gap:7px}
      .price,.buy{width:68px;height:38px}
      .price{font-size:13px}
      .buy{font-size:12px}
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="filter" id="filter"></div>
    <div class="grid" id="cards"></div>
  </div>

  <script>
    /*
      এখান থেকে product change করবেন.
      image path হবে: images/your-image-name.png
      index.html এর পাশে images folder রাখবেন.
    */

    const whatsappNumber = "8801741815153";

    const categories = [
      ["all", "All"],
      ["chatgpt", "ChatGPT"],
      ["gemini", "Gemini"],
      ["canva", "Canva"],
      ["youtube", "YouTube Premium"]
    ];

    const products = [
      {
        category: "chatgpt",
        title: "ChatGPT Plus Personal",
        product: "ChatGPT Account",
        plan: "ChatGPT Plus Personal",
        validity: "30 Days",
        guarantee: "Guarantee",
        price: "399",
        image: "images/chatgpt-plus-personal.png"
      },
      {
        category: "chatgpt",
        title: "ChatGPT Plus Share",
        product: "ChatGPT Account",
        plan: "ChatGPT Plus Share",
        validity: "30 Days",
        guarantee: "Guarantee",
        price: "149",
        image: "images/chatgpt-plus-share.png"
      },
      {
        category: "chatgpt",
        title: "ChatGPT Go Personal",
        product: "ChatGPT Account",
        plan: "ChatGPT Go Personal",
        validity: "30 Days",
        guarantee: "Guarantee",
        price: "750",
        image: "images/chatgpt-go-personal.png"
      },
      {
        category: "chatgpt",
        title: "ChatGPT Go Share",
        product: "ChatGPT Account",
        plan: "ChatGPT Go Share",
        validity: "30 Days",
        guarantee: "Guarantee",
        price: "99",
        image: "images/chatgpt-go-share.png"
      },
      {
        category: "gemini",
        title: "Gemini Pro ",
        product: "Gemini Account",
        plan: "Gemini Pro Access",
        validity: "30 Days",
        guarantee: "Guarantee",
        price: "49",
        image: "images/gemini-pro.png"
      },
      {
        category: "canva",
        title: "Canva Pro",
        product: "Canva Account",
        plan: "Canva Pro",
        validity: "30 Days",
        guarantee: "Guarantee",
        price: "19",
        image: "images/canva-pro.png"
      },
      {
        category: "youtube",
        title: "YouTube Premium",
        product: "YouTube Premium",
        plan: "YouTube Premium",
        validity: "30 Days",
        guarantee: "Guarantee",
        price: "49",
        image: "images/youtube-premium.png"
      },
      {
        category: "youtube",
        title: "YouTube Family ",
        product: "YouTube Premium",
        plan: "YouTube Family",
        validity: "30 Days",
        guarantee: "Guarantee",
        price: "199",
        image: "images/youtube-family.png"
      }
    ];

    const filterBox = document.getElementById("filter");
    const cardBox = document.getElementById("cards");
    let activeCategory = "all";

    function renderFilters() {
      filterBox.innerHTML = categories.map(([value, label]) => `
        <button class="${activeCategory === value ? "active" : ""}" data-category="${value}">
          ${label}
        </button>
      `).join("");
    }

    function renderCards() {
      const filteredProducts = products.filter(item =>
        activeCategory === "all" || item.category === activeCategory
      );

      if (!filteredProducts.length) {
        cardBox.innerHTML = `<div class="empty">No product found.</div>`;
        return;
      }

      cardBox.innerHTML = filteredProducts.map((item, index) => `
        <div class="card" tabindex="0">
          <div class="img-box">
            <img src="${item.image}" alt="${item.title}">
          </div>

          <div class="content">
            <div class="title">${item.title}</div>

            <div class="info">
              <span>Validity: ${item.validity}</span>
              <span>${item.guarantee}</span>
            </div>

            <div class="bottom">
              <div class="price">৳${item.price}</div>
              <button class="buy" data-index="${products.indexOf(item)}">Buy</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    filterBox.addEventListener("click", function(e) {
      const button = e.target.closest("button");
      if (!button) return;

      activeCategory = button.dataset.category;
      renderFilters();
      renderCards();
    });

    cardBox.addEventListener("click", function(e) {
      const buyButton = e.target.closest(".buy");

      if (buyButton) {
        e.stopPropagation();

        const item = products[buyButton.dataset.index];
        const message = `আমি ${item.product} কিনতে চাই। যার প্রাইস ${item.price} টাকা। প্যাকেজ: ${item.plan}`;

        window.open(
          `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`,
          "_blank"
        );

        return;
      }

      const card = e.target.closest(".card");
      if (!card) return;

      document.querySelectorAll(".card").forEach(item => {
        item.classList.remove("is-active");
      });

      card.classList.add("is-active");
    });

    renderFilters();
    renderCards();
  </script>
</body>
</html>
